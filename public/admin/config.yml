backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "leech-docs"
    label: "Раздел о пиявках"
    folder: "content/leech"
    create: true
    slug: "{{slug}}"
    preview_path: "leech/{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - {
          label: "Description (SEO)",
          name: "description",
          widget: "string",
          required: false,
        }
      - { label: "Содержимое", name: "body", widget: "markdown" }
