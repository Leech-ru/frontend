<form tuiForm="l" [formGroup]="form.group">
  <ng-container formGroupName="contact">
    <tui-textfield>
      <input formControlName="name" placeholder="ФИО" tuiInput />
    </tui-textfield>
    <tui-error formControlName="name" />

    <tui-textfield>
      <input
        formControlName="phone"
        placeholder="Номер телефона"
        tuiInputPhone
        mask="+7 (###) ###-##-##"
      />
    </tui-textfield>
    <tui-error formControlName="phone" />

    <tui-textfield>
      <input
        formControlName="email"
        placeholder="Адрес электронной почты"
        tuiInput
      />
    </tui-textfield>
    <tui-error formControlName="email" />

    <tui-textfield>
      <input formControlName="address" placeholder="Адрес доставки" tuiInput />
    </tui-textfield>
    <tui-error formControlName="address" />

    <tui-textfield>
      <textarea
        formControlName="comment"
        placeholder="Комментарии"
        tuiTextarea
        [min]="3"
        [max]="6"
        [limit]="512"
      ></textarea>
    </tui-textfield>
    <tui-error formControlName="comment" />

    <label>
      <input type="checkbox" size="s" tuiCheckbox formControlName="agreement" />
      <span class="tui-text_body-s">
        Я даю согласие на обработку своих персональных данных и соглашаюсь с
        <a tuiLink href="#">политикой конфиденциальности</a>
      </span>
    </label>
    <tui-error formControlName="agreement" />
  </ng-container>
</form>
