<header tuiHeader>
  <a
    tuiButton
    appearance="flat"
    size="s"
    iconStart="@tui.chevron-left"
    routerLink="/admin/cosmetics"
  >
    <span i18n>Назад</span>
  </a>
  <hr [style.opacity]="0" />
  <aside tuiAccessories>
    <button tuiButton type="button"><span i18n>Создать товар</span></button>
  </aside>
</header>

<header tuiHeader [style.margin-top.rem]="0.5">
  <h1 tuiTitle>{{ loadedCategory()?.name }}</h1>
  <aside tuiAccessories>
    <button
      class="actions-button"
      tuiButton
      appearance="flat"
      tuiDropdownSheet="Действия"
      i18n-tuiDropdownSheet
      iconStart="@tui.more-vertical"
      [tuiDropdown]="dropdownContent"
      [tuiDropdownManual]="openActions()"
      tuiDropdownAlign="end"
      (click)="toggleActions()"
    ></button>
    <ng-template #dropdownContent>
      <tui-data-list>
        <button
          tuiOption
          iconStart="@tui.pencil"
          (click)="editCategory(); closeActions()"
        >
          <span i18n>Редактировать</span>
        </button>
        <button tuiOption iconStart="@tui.trash" (click)="deleteCategory()">
          <span i18n>Удалить</span>
        </button>
      </tui-data-list>
    </ng-template>
  </aside>
</header>

<tui-block-status [card]="true" class="card" size="m">
  <div tuiAvatar="@tui.package" tuiSlot="top"></div>
  <h4 i18n>Нет товаров</h4>
  <span i18n>В этой категории пока нет товаров</span>
  <button appearance="secondary" tuiButton type="button" size="s">
    <span i18n>Создать товар</span>
  </button>
</tui-block-status>
