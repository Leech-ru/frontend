<header tuiHeader="h4">
  <h1 tuiTitle i18n>Пользователи</h1>
</header>

<search tuiSearch>
  <form [formRoot]="form">
    <fieldset tuiTextfieldSize="m">
      <tui-textfield iconStart="@tui.search">
        <input
          [formField]="form.q"
          placeholder="Поиск"
          i18n-placeholder
          tuiInput
        />
      </tui-textfield>

      <tui-textfield
        tuiChevron
        [stringify]="getRoleDisplayName"
        tuiDropdownSheet="Выберите роль"
        i18n-tuiDropdownSheet
      >
        <input
          [ngModel]="form.role().value()"
          (ngModelChange)="
            usersResource.filters.update((filters) => ({
              ...filters,
              role: $event,
            }))
          "
          [ngModelOptions]="{ standalone: true }"
          placeholder="Роль"
          i18n-placeholder
          tuiSelect
        />
        <tui-data-list-wrapper
          *tuiDropdown
          [itemContent]="getRoleDisplayName | tuiStringifyContent"
          [items]="roles"
        />
      </tui-textfield>
    </fieldset>
  </form>
</search>

<tui-loader [loading]="usersResource.isLoading()" [overlay]="true">
  <div tuiCardLarge="compact" appearance="outline">
    @for (user of usersResource.placeholder().items; track user.id) {
      <button type="button" (click)="editUserFormDialog.open(user)" tuiCell>
        <div
          [tuiAvatar]="`${user.name} ${user.surname}` | tuiInitials"
          size="m"
        ></div>
        <div tuiTitle tuiFade>
          {{ `${user.name} ${user.surname}` }}
          <span tuiSubtitle>{{ user.email }}</span>
        </div>
        <app-user-role-badge [role]="user.role" />
      </button>
    } @empty {
      @if (usersResource.loaded()) {
        <tui-block-status size="m">
          <div tuiAvatar="@tui.user-x" tuiSlot="top"></div>

          <h4 i18n>Нет результатов</h4>

          <span i18n>Попробуйте изменить фильтры</span>

          <button
            appearance="secondary"
            tuiButton
            type="button"
            size="s"
            (click)="usersResource.reset()"
          >
            <span i18n>Сбросить фильтры</span>
          </button>
        </tui-block-status>
      }
    }
    @if (usersResource.placeholder().items.length) {
      <footer>
        <tui-table-pagination
          [page]="usersResource.params().offset / usersResource.params().limit"
          [size]="usersResource.params().limit"
          [total]="usersResource.placeholder().pagination.total_items"
          [items]="sizes"
          (paginationChange)="usersResource.paginate($event)"
        />
      </footer>
    }
  </div>
</tui-loader>
