<form id="user-edit-form" tuiForm [formGroup]="form" (ngSubmit)="submit()">
  <tui-textfield [tuiTextfieldCleaner]="false">
    <input
      tuiInput
      [readOnly]="isLoading()"
      tuiAutoFocus
      placeholder="Имя"
      i18n-placeholder
      formControlName="name"
    />
  </tui-textfield>
  <tui-error [formControl]="form.controls.name" />

  <tui-textfield [tuiTextfieldCleaner]="false">
    <input
      tuiInput
      [readOnly]="isLoading()"
      placeholder="Фамилия"
      i18n-placeholder
      formControlName="surname"
    />
  </tui-textfield>
  <tui-error [formControl]="form.controls.surname" />

  <tui-textfield [tuiTextfieldCleaner]="false">
    <input
      tuiInput
      [readOnly]="isLoading()"
      placeholder="Адрес электронной почты"
      i18n-placeholder
      formControlName="email"
    />
  </tui-textfield>
  <tui-error [formControl]="form.controls.email" />

  <tui-textfield
    tuiChevron
    [stringify]="getRoleDisplayName"
    [tuiTextfieldCleaner]="false"
    tuiDropdownSheet="Выберите роль"
    i18n-tuiDropdownSheet
  >
    <input
      tuiSelect
      [readOnly]="isLoading() || isOwnProfile"
      formControlName="role"
      placeholder="Роль"
      i18n-placeholder
    />
    <tui-data-list-wrapper
      *tuiDropdown
      [itemContent]="getRoleDisplayName | tuiStringifyContent"
      [items]="roles"
    />
  </tui-textfield>
  <tui-error [formControl]="form.controls.role" />

  <tui-error [error]="error()" />
</form>

<footer>
  <button
    appearance="secondary"
    tuiButton
    type="button"
    [disabled]="isLoading()"
    (click)="context.$implicit.complete()"
  >
    <span i18n>Закрыть</span>
  </button>
  <button form="user-edit-form" tuiButton type="submit" [loading]="isLoading()">
    <span i18n>Сохранить</span>
  </button>
</footer>
