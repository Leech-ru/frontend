<form id="user-edit-form" tuiForm [formGroup]="form" (ngSubmit)="submit()">
  <tui-textfield [tuiTextfieldCleaner]="false">
    <input
      tuiInput
      [readOnly]="this.state.isLoading()"
      tuiAutoFocus
      placeholder="Имя"
      formControlName="name"
    />
  </tui-textfield>
  <tui-error [formControl]="form.controls.name" />

  <tui-textfield [tuiTextfieldCleaner]="false">
    <input
      tuiInput
      [readOnly]="this.state.isLoading()"
      placeholder="Фамилия"
      formControlName="surname"
    />
  </tui-textfield>
  <tui-error [formControl]="form.controls.surname" />

  <tui-textfield [tuiTextfieldCleaner]="false">
    <input
      tuiInput
      [readOnly]="this.state.isLoading()"
      placeholder="Адрес электронной почты"
      formControlName="email"
    />
  </tui-textfield>
  <tui-error [formControl]="form.controls.email" />

  <tui-textfield
    tuiChevron
    [stringify]="stringifyRole"
    [tuiTextfieldCleaner]="false"
    tuiDropdownSheet="Выберите роль"
  >
    <input
      tuiSelect
      [readOnly]="this.state.isLoading()"
      formControlName="role"
      placeholder="Роль"
    />
    <tui-data-list-wrapper
      *tuiDropdown
      [itemContent]="stringifyRole | tuiStringifyContent"
      [items]="items"
    />
  </tui-textfield>
  <tui-error [formControl]="form.controls.role" />

  <tui-error [error]="state.error()" />
</form>

<footer>
  <button
    appearance="secondary"
    tuiButton
    type="button"
    [disabled]="state.isLoading()"
    (click)="context.$implicit.complete()"
  >
    Закрыть
  </button>
  <button
    form="user-edit-form"
    tuiButton
    type="submit"
    [loading]="state.isLoading()"
  >
    Сохранить
  </button>
</footer>
