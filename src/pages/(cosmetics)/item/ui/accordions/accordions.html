<tui-accordion>
  <ng-container>
    <button i18n tuiAccordion>Характеристики</button>
    <tui-expand>
      <div tuiCell>
        <div i18n tuiTitle>Объём</div>
        <span class="tui-text_bold">{{ data().features.size }} мл.</span>
      </div>
      <hr />
      <div tuiCell>
        <div i18n tuiTitle>Раздел</div>
        <span class="tui-text_bold">{{ data().features.category }}</span>
      </div>
      <hr />
    </tui-expand>
  </ng-container>
</tui-accordion>

<tui-accordion>
  <ng-container>
    <button i18n tuiAccordion>Описание</button>
    <tui-expand>{{ data().description }}</tui-expand>
  </ng-container>
  <ng-container>
    <button i18n tuiAccordion>Способ применения</button>
    <tui-expand>{{ data().guide }}</tui-expand>
  </ng-container>
</tui-accordion>
