<app-hero
  heading="Каталог косметики"
  description="Линия «bioenergy, antistress, antiage» (ВАА) — максимальная степень активности БАВ и чистоты слюны пиявок, подчеркнутые оригинальной композицией косметических средств. Эта линия обладает биоэнергетическим, антистрессорным и омолаживающим действием"
/>

<main class="cosmetic-category-list">
  <div role="list" class="list__grid">
    @for (category of categories().items; track category.id) {
      <app-cosmetics-category-card
        role="listitem"
        class="grid__element"
        [id]="category.id"
        [name]="category.name"
        [routerLink]="'/cosmetics/categories/' + category.id"
        [imageId]="category.image_id"
      />
    }
  </div>
</main>
