<header>
  <tui-breadcrumbs tuiFade>
    <a *tuiItem tuiLink routerLink="/cosmetics" i18n>Каталог косметики</a>
    <strong *tuiItem>
      {{ category().name }}
    </strong>
  </tui-breadcrumbs>
</header>

<main class="app-cosmetic-category">
  <app-hero [heading]="category().name" description="" />
  <div role="list" class="app-cosmetic-category__item-list">
    @for (item of mockItems(); track item.id) {
      <app-cosmetics-item-card
        [routerLink]="['/cosmetics/categories/', category().id, item.id]"
        appearance="floating"
        [data]="item"
      />
    }
  </div>
</main>
