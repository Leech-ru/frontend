<tui-tabs [(activeItemIndex)]="activeItemIndex" tuiFade>
  <a
    #tab
    tuiTab
    iconStart="@tui.info"
    routerLink="/admin"
    routerLinkActive
    [routerLinkActiveOptions]="{ exact: true }"
  >
    {{ infoLabel }}
  </a>
  <a
    #tab
    tuiTab
    iconStart="@tui.store"
    routerLink="/admin/cosmetics"
    routerLinkActive
  >
    {{ cosmeticsLabel }}
  </a>
  <a
    #tab
    tuiTab
    iconStart="@tui.handshake"
    routerLink="/admin/partners"
    routerLinkActive
  >
    {{ partnersLabel }}
  </a>
  <a
    #tab
    tuiTab
    iconStart="@tui.users"
    routerLink="/admin/users"
    routerLinkActive
  >
    {{ usersLabel }}
  </a>
</tui-tabs>
