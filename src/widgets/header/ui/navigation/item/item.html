<a
  #rla="routerLinkActive"
  class="app-header-navigation-link"
  tuiButton
  size="m"
  [appearance]="rla.isActive ? 'flat' : 'flat-grayscale'"
  [routerLink]="item().routerLink"
  routerLinkActive
  [routerLinkActiveOptions]="{
    exact: item().routerLink === '/' ? true : false,
  }"
>
  {{ item().label }}
</a>
