<a [routerLink]="['cosmetic/', data().id]" tuiCardLarge appearance="floating">

  <div class="left">
    <header>
      <h4 class="heading" [title]="data().name">
        {{ data().name }}
      </h4>
    </header>
    <footer>
      <span tuiAppearance="flat" i18n>Подробнее</span>
    </footer>
  </div>
</a>
