<a
  class="cosmetic-category__card"
  tuiCardLarge
  tuiHeader
  appearance="floating"
  [routerLink]="routerLink()"
>
  <h2 class="cosmetic-category-card__text" tuiTitle>
    {{ name() }}
  </h2>
  <aside>
    <div tuiAvatar size="xxl" appearance="accent">
      <img [alt]="name()" [src]="imageUrl()" />
    </div>
  </aside>
</a>
