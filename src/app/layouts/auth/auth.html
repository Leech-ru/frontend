@if (isServer()) {
  <tui-block-status>
    <tui-loader size="xl" tuiSlot="top" [loading]="true" />
    <h4>Загружаем страницу</h4>
    Это может занять несколько секунд
  </tui-block-status>
} @else {
  <a
    tuiButton
    appearance="flat"
    size="m"
    routerLink="/"
    iconStart="@tui.chevron-left"
  >
    Назад
  </a>

  <router-outlet />
}
